<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SA5IKN Amateur Radio Station – EME, Satellites, DXing & Contesting</title>

    <meta name="description" content="Website of Max SA5IKN (M0SKN, US6IKN, EI6KC) with ham radio resources and tools for EME (Moonbounce), amateur satellites, DXing, HF, VHF, UHF.">
    <meta name="keywords" content="EME, Moonbounce, Ham Radio, Amateur Satellites, DXing, HF, VHF, UHF, 10GHz, EME Observer, Satellite Maps, Lunar Ephemeris">
    <meta name="author" content="Max SA5IKN">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://dxer.site">

    <!-- Open Graph / Twitter -->
    <meta property="og:title" content="SA5IKN Amateur Radio Station – EME, Satellites, DXing & Contesting">
    <meta property="og:description" content="Website of Max SA5IKN (M0SKN, US6IKN, EI6KC) with ham radio resources and tools for EME (Moonbounce), amateur satellites, DXing, HF, VHF, UHF.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dxer.site">
    <meta property="og:image" content="https://dxer.site/social/sa5ikn-main.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SA5IKN Amateur Radio Station – EME, Satellites, DXing & Contesting">
    <meta name="twitter:description" content="Website of Max SA5IKN (M0SKN, US6IKN, EI6KC) with ham radio resources and tools for EME (Moonbounce), amateur satellites, DXing, HF, VHF, UHF.">
    <meta name="twitter:image" content="https://dxer.site/social/sa5ikn-main.jpg">
    <meta name="twitter:site" content="@M0SKN_SA5IKN">

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://dxer.site/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://dxer.site/assets/favicon-16x16.png">
    <link rel="shortcut icon" href="https://dxer.site/assets/favicon.ico">
    <link rel="apple-touch-icon" href="https://dxer.site/assets/apple-touch-icon.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'media' }
    </script>

    <style>
      @media screen and (prefers-reduced-data: reduce), print {
        .header-content { display: none !important; }
      }
      .news-list-item {
        transition: color 0.2s ease;
      }
      .news-list-item:hover {
        color: #2563eb;
      }
      .dark .news-list-item:hover {
        color: #60a5fa;
      }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen">

    <header class="bg-white dark:bg-gray-800 shadow relative">
      <div id="shared-header"></div>
    </header>

    <!-- Latest News - Simple List Style (very compact) -->
    <section id="latest-news" class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 py-5 px-4 mx-auto max-w-7xl">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-base font-bold text-gray-800 dark:text-gray-200">Latest News</h2>
        <a href="news.html" class="text-blue-600 dark:text-blue-400 hover:underline font-medium text-sm">
          All news →
        </a>
      </div>

      <div id="news-preview" class="space-y-3 text-sm">
        <!-- Populated by JavaScript as a clean list -->
      </div>
    </section>

    <main class="container mx-auto p-4 max-w-7xl">
      <div class="mb-8">

        <!-- Filter Buttons -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
          <div class="flex items-center gap-3">
            <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Filter:</span>
            <div class="flex flex-wrap gap-2">
              <button onclick="filterPosts('ALL')"
                class="text-xs px-5 py-2 bg-blue-100 dark:bg-blue-900/50 hover:bg-blue-200 dark:hover:bg-blue-800 active:bg-blue-300 dark:active:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-full transition-all font-medium">
                ALL
              </button>
              <button onclick="filterPosts('EME')"
                class="text-xs px-5 py-2 bg-blue-100 dark:bg-blue-900/50 hover:bg-blue-200 dark:hover:bg-blue-800 active:bg-blue-300 dark:active:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-full transition-all font-medium">
                EME
              </button>
              <button onclick="filterPosts('SATELLITES')"
                class="text-xs px-5 py-2 bg-blue-100 dark:bg-blue-900/50 hover:bg-blue-200 dark:hover:bg-blue-800 active:bg-blue-300 dark:active:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-full transition-all font-medium">
                SATELLITES
              </button>
              <button onclick="filterPosts('MICROWAVES')"
                class="text-xs px-5 py-2 bg-blue-100 dark:bg-blue-900/50 hover:bg-blue-200 dark:hover:bg-blue-800 active:bg-blue-300 dark:active:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-full transition-all font-medium">
                MICROWAVES
              </button>
            </div>
          </div>
        </div>

        <!-- Grid View Only -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

          <!-- Example Post Card -->
          <article data-type="MICROWAVES" class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden transition-all duration-300 hover:shadow-xl hover:scale-[1.02] group">
            <a href="/posts/working-qo100-without-dish.html" class="block">
              <div class="relative overflow-hidden">
                <img src="https://dxer.site/img/works/Flatpanel.jpeg" alt="QO-100 flat panel"
                     class="w-full h-48 object-cover transition-transform duration-500 group-hover:scale-105">
              </div>
              <div class="p-5">
                <h3 class="font-semibold text-lg leading-tight mb-2 line-clamp-2">Working QO-100 without a dish: An ultraportable FT8 station</h3>
                <p class="text-gray-600 dark:text-gray-400 text-sm line-clamp-3 mb-4">Compact FT8 setup using a small flat panel antenna, low-power SDR transceiver and minimal gear.</p>
                <span class="text-blue-600 dark:text-blue-400 text-sm font-medium">Read more →</span>
              </div>
            </a>
          </article>

          <!-- Add your other post cards here -->

        </div>
      </div>
    </main>

    <footer class="bg-gray-100 dark:bg-gray-800 text-center p-6 mt-12 text-sm text-gray-600 dark:text-gray-400 border-t border-gray-200 dark:border-gray-700">
      © All rights reserved. SA5IKN M0SKN US6IKN EI6KC, <span id="copyright-year"></span>
    </footer>

    <!-- Scroll to Top -->
    <button id="scrollTopBtn" title="Go to top"
      class="hidden fixed bottom-8 right-8 z-50 bg-blue-600 text-white rounded-full p-4 shadow-lg hover:bg-blue-700 transition duration-300">
      ↑
    </button>

    <script>
      // ==================== SIMPLE LIST NEWS PREVIEW ====================
      fetch('news.html')
        .then(response => response.text())
        .then(html => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const newsItems = doc.querySelectorAll('.news-item');
          const container = document.getElementById('news-preview');

          container.innerHTML = '';

          [...newsItems].slice(0, 3).forEach(item => {
            const titleEl = item.querySelector('h2');
            const dateSpan = titleEl ? titleEl.querySelector('span.text-sm') : null;
            const headline = titleEl ? titleEl.textContent.replace(dateSpan ? dateSpan.textContent : '', '').trim() : 'News';

            const div = document.createElement('div');
            div.className = "news-list-item flex gap-3 cursor-pointer py-1";

            div.innerHTML = `
              <div class="text-xs text-gray-500 dark:text-gray-400 whitespace-nowrap flex-shrink-0 pt-0.5">
                ${dateSpan ? dateSpan.textContent.trim() : ''}
              </div>
              <div class="flex-1 leading-snug text-gray-800 dark:text-gray-200">
                ${headline}
              </div>
            `;

            // Click anywhere on the row → go to news page
            div.addEventListener('click', () => {
              window.location.href = 'news.html';
            });

            container.appendChild(div);
          });
        })
        .catch(() => {
          document.getElementById('news-preview').innerHTML = `<p class="text-gray-500 dark:text-gray-400 text-sm py-2">Could not load news.</p>`;
        });

      // Filter function for posts
      function filterPosts(type) {
        document.querySelectorAll('[data-type]').forEach(el => {
          el.classList.toggle('hidden', type !== 'ALL' && el.dataset.type !== type);
        });
      }

      // ==================== HEADER + HAMBURGER MENU ====================
      fetch('header.html?v=2')
        .then(response => response.text())
        .then(data => {
          document.getElementById('shared-header').innerHTML = data;

          const menuToggle = document.getElementById('menu-toggle');
          const mobileMenu = document.getElementById('mobile-menu');

          if (menuToggle && mobileMenu) {
            menuToggle.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
          }

          const mobileToolsBtn = document.getElementById('mobile-tools-btn');
          const mobileSubmenu = document.getElementById('mobile-tools-submenu');
          const arrow = document.getElementById('submenu-arrow');

          if (mobileToolsBtn && mobileSubmenu && arrow) {
            mobileToolsBtn.addEventListener('click', () => {
              mobileSubmenu.classList.toggle('hidden');
              arrow.classList.toggle('rotate-180');
            });
          }

          // Active page highlighting
          const currentPath = window.location.pathname.split('/').pop() || 'index.html';
          document.querySelectorAll('#shared-header a[href]').forEach(link => {
            const href = link.getAttribute('href');
            if (href && (href === currentPath || href.endsWith('/' + currentPath))) {
              link.classList.add('text-blue-600', 'font-bold');
            }
          });
        })
        .catch(err => {
          console.error('Header failed to load:', err);
          document.getElementById('shared-header').innerHTML = '<p class="p-4 text-red-600">Menu failed to load.</p>';
        });

      // Copyright year
      document.getElementById('copyright-year').textContent = new Date().getFullYear();

      // Scroll to top
      const scrollTopBtn = document.getElementById("scrollTopBtn");
      window.onscroll = function() {
        scrollTopBtn.classList.toggle("hidden",
          document.body.scrollTop <= 300 && document.documentElement.scrollTop <= 300);
      };
      scrollTopBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    </script>
</body>
</html>
