<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dish Antenna Beamwidth Tool</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  <style>
    :root {
      --primary: #2563eb;
      --accent: #1e40af;
      --text: #1f2937;
      --bg: #f8fafc;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
      margin: 20px;
      background: #f1f5f9;
      line-height: 1.5;
    }

    h2 {
      margin: 0 0 8px 0;
      color: var(--text);
      font-size: 1.75rem;
      font-weight: 700;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-bottom: 30px;
      padding: 0;
    }

    .panel {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 24px;
      border: 1px solid #e2e8f0;
    }

    .panel h3 {
      margin: 0 0 16px 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .diameter-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .diameter-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f8fafc;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      transition: all 0.2s ease;
    }

    .diameter-item:hover {
      border-color: #94a3b8;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .diameter-item input {
      flex: 1;
      max-width: 140px;
      padding: 10px 14px;
      font-size: 1.1rem;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      transition: border 0.2s;
    }

    .diameter-item input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .diameter-item button {
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .diameter-item button:hover {
      background: #dc2626;
      transform: scale(1.05);
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px 28px;
      align-items: center;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: 500;
      color: #334155;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }

    .checkbox-group input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .checkbox-group label:hover {
      color: var(--accent);
    }

    .actions {
      display: flex;
      justify-content: center;
      padding: 8px 0;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--primary), var(--accent));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px 48px;
      font-size: 1.25rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
      transition: all 0.3s ease;
      min-width: 280px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: #e0f2fe;
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Desktop layout */
    @media (min-width: 768px) {
      .controls {
        grid-template-columns: 2fr 1fr;
      }
      
      .actions {
        grid-column: span 2;
      }
      
      .panel {
        padding: 28px;
      }
    }

    /* Extra small mobile tweaks */
    @media (max-width: 480px) {
      .diameter-item input {
        font-size: 1rem;
        padding: 9px 12px;
      }
      .btn-primary {
        min-width: 100%;
        padding: 14px 32px;
        font-size: 1.1rem;
      }
    }

    .footer-note {
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 12px;
    }
  </style>
</head>

<body>

<h2>Dish Antenna Beamwidth Calculator</h2>
<p class="subtitle"><small>Uses approximate formula HPBW ≈ 70 × (λ / D) degrees</small></p>

<div class="controls">

  <!-- Antenna Diameters Panel -->
  <div class="panel">
    <h3>Antenna Diameters <small style="font-weight:400; color:#64748b;">(meters)</small></h3>
    <div id="diameterInputs" class="diameter-list"></div>
    <button onclick="addAntenna()" class="btn-secondary">
      <span style="font-size:1.3rem; line-height:1;">+</span>
      Add Antenna
    </button>
  </div>

  <!-- Beamwidth Level Curves Panel -->
  <div class="panel">
    <h3>Beamwidth Level Curves</h3>
    <div class="checkbox-group">
      <label><input type="checkbox" value="3" checked> 3 dB</label>
      <label><input type="checkbox" value="1"> 1 dB</label>
      <label><input type="checkbox" value="0.5" checked> 0.5 dB</label>
      <label><input type="checkbox" value="0.1"> 0.1 dB</label>
    </div>
  </div>

  <!-- Action Bar -->
  <div class="actions">
    <button onclick="updatePlot()" class="btn-primary">
      Update Plot
    </button>
  </div>

</div>

<div id="plot"></div>

<script>
const c = 299792458;
const BEAMWIDTH_CONSTANT = 70;

const F_START_GHZ = 0.144;
const F_END_GHZ = 78;

const logStart = Math.log10(F_START_GHZ);
const logEnd   = Math.log10(F_END_GHZ);
const logRange = logEnd - logStart;

const emeFreqs = [0.1441, 0.4321, 1.2961, 2.3041, 3.4561, 5.7601, 10.3681, 24.1921, 47.0881, 76.5];

function generateLogTicks(minVal, maxVal) {
  const ticks = [];
  let decade = Math.pow(10, Math.floor(Math.log10(minVal) - 0.01));
  while (decade <= maxVal * 1.1) {
    for (let m of [1, 2, 5]) {
      const t = m * decade;
      if (t >= minVal * 0.9 && t <= maxVal * 1.1) {
        if (ticks.length === 0 || t / ticks[ticks.length - 1] >= 1.15) ticks.push(t);
      }
    }
    decade *= 10;
  }
  return ticks;
}

function logSpace(start, end, points) {
  const arr = [];
  const ls = Math.log10(start);
  const le = Math.log10(end);
  for (let i = 0; i < points; i++) {
    const t = i / (points - 1);
    arr.push(Math.pow(10, ls + t * (le - ls)));
  }
  return arr;
}

function hpbw(lambda, D, dbLevel) {
  const bw3 = BEAMWIDTH_CONSTANT * (lambda / D);
  if (dbLevel === "3") return bw3;
  const factor = Math.sqrt(parseFloat(dbLevel) / 3);
  return bw3 * factor;
}

function addAntenna(value = 1.0) {
  const div = document.getElementById("diameterInputs");
  const wrapper = document.createElement("div");
  wrapper.className = "diameter-item";
  
  const input = document.createElement("input");
  input.type = "number";
  input.step = "0.1";
  input.value = value;
  
  const removeBtn = document.createElement("button");
  removeBtn.innerHTML = "Remove";
  removeBtn.onclick = () => { wrapper.remove(); updatePlot(); };
  
  wrapper.appendChild(input);
  wrapper.appendChild(removeBtn);
  div.appendChild(wrapper);
}

function getDiameters() {
  return Array.from(document.querySelectorAll("#diameterInputs input"))
    .map(i => parseFloat(i.value))
    .filter(v => !isNaN(v) && v > 0);
}

function getSelectedCurves() {
  return Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
    .map(cb => cb.value);
}

function updatePlot() {
  const freq_hz = logSpace(F_START_GHZ * 1e9, F_END_GHZ * 1e9, 1000);
  const freq_ghz = freq_hz.map(f => f / 1e9);
  const lambda = freq_hz.map(f => c / f);

  const diameters = getDiameters();
  const curves = getSelectedCurves();

  let traces = [];

  diameters.forEach(D => {
    curves.forEach(curve => {
      const scaled = lambda.map(lam => hpbw(lam, D, curve));

      traces.push({
        x: freq_ghz,
        y: scaled,
        mode: "lines",
        name: `${D} m (${curve} dB)`,
        line: { width: 2.8 },
        hovertemplate:
          `<b>${D} m Antenna</b><br>` +
          `Level: ${curve} dB<br>` +
          `Frequency: %{x:.4f} GHz<br>` +
          `Beamwidth: %{y:.3f}°<extra></extra>`
      });

      const emeY = emeFreqs.map(f => {
        let idx = 0, minDiff = Infinity;
        for (let i = 0; i < freq_ghz.length; i++) {
          const diff = Math.abs(freq_ghz[i] - f);
          if (diff < minDiff) { minDiff = diff; idx = i; }
        }
        return scaled[idx];
      });

      traces.push({
        x: emeFreqs,
        y: emeY,
        mode: "markers",
        marker: { size: 7.5, color: "#b91c1c", symbol: "circle", line: {color: "white", width: 1.8} },
        showlegend: false,
        hovertemplate:
          `EME Frequency: %{x:.4f} GHz<br>` +
          `Beamwidth: %{y:.3f}°<br>` +
          `(${D} m @ ${curve} dB)<extra></extra>`
      });
    });
  });

  let allY = traces.flatMap(t => t.y || []);
  const yMin = allY.length ? Math.max(0.001, Math.min(...allY)) : 0.01;
  const yMax = allY.length ? Math.max(1, Math.max(...allY) * 1.25) : 100;
  const yLogMin = Math.log10(yMin * 0.8);
  const yLogMax = Math.log10(yMax * 1.25);

  const xTicks = generateLogTicks(F_START_GHZ, F_END_GHZ);

  const emeShapes = emeFreqs.map(f => ({
    type: "line", xref: "paper", yref: "paper",
    x0: (Math.log10(f) - logStart) / logRange,
    x1: (Math.log10(f) - logStart) / logRange,
    y0: 0, y1: 1,
    line: { color: "rgba(220, 20, 60, 0.55)", width: 1.5, dash: "dot" },
    layer: "below"
  }));

  const emeAnnotations = emeFreqs.map(f => ({
    x: (Math.log10(f) - logStart) / logRange + 0.004,
    y: 0.96,
    xref: "paper", yref: "paper",
    text: f.toFixed(3),
    showarrow: false,
    xanchor: "left",
    font: { size: 11.5, color: "#b91c1c" },
    textangle: -90,
    opacity: 0.9
  }));

  const LIMIT = 35;

  const limitShapes = [{
    type: "line",
    xref: "paper", yref: "y",
    x0: 0, x1: 1,
    y0: LIMIT, y1: LIMIT,
    line: { color: "#d97706", width: 4, dash: "dash" },
    layer: "above"
  }];

  const limitAnnotations = [{
    x: 0.92,
    y: LIMIT * 1.35,
    xref: "paper", yref: "y",
    text: "<b>HPBW ≈ 2λ</b><br>(practical limit)",
    showarrow: true,
    arrowhead: 2,
    ax: -30,
    ay: 40,
    font: { size: 18, color: "#d97706" },
    bgcolor: "#fff9c4",
    bordercolor: "#d97706",
    borderwidth: 3,
    borderpad: 8,
    opacity: 1
  }];

  const layout = {
    title: "Log-Log Plot of Parabolic Antenna Beamwidth vs Frequency<br><sub>Orange line = practical limit (HPBW ≈ 2λ)</sub>",
    xaxis: {
      title: "Frequency (GHz)",
      type: "log",
      range: [logStart, logEnd],
      fixedrange: true,
      tickmode: "array",
      tickvals: xTicks,
      ticktext: xTicks.map(v => v >= 10 ? v.toFixed(0) : v.toFixed(v < 1 ? 3 : 2)),
      gridcolor: "#ddd",
      minor: { showgrid: true }
    },
    yaxis: {
      title: "Beamwidth (degrees)",
      type: "log",
      range: [yLogMin, yLogMax],
      fixedrange: true,
      tickmode: "array",
      tickvals: generateLogTicks(Math.pow(10, yLogMin), Math.pow(10, yLogMax)),
      ticktext: generateLogTicks(Math.pow(10, yLogMin), Math.pow(10, yLogMax)).map(v => v >= 10 ? v.toFixed(0) : v.toFixed(v < 1 ? 3 : 2)),
      gridcolor: "#ddd",
      minor: { showgrid: true }
    },
    shapes: [...emeShapes, ...limitShapes],
    annotations: [...emeAnnotations, ...limitAnnotations],
    hovermode: "closest",
    dragmode: false,
    height: 720,
    margin: { t: 80, b: 60, l: 70, r: 40 }
  };

  const config = {
    scrollZoom: false,
    displayModeBar: true,
    modeBarButtonsToRemove: ['zoom2d','pan2d','select2d','lasso2d','zoomIn2d','zoomOut2d'],
    displaylogo: false
  };

  Plotly.newPlot("plot", traces, layout, config);
}

// Initialize with default antennas
addAntenna(3.0);
addAntenna(0.9);
updatePlot();
</script>

</body>
</html>
