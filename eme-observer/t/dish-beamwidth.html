<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dish Antenna Beamwidth Tool</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  <style>
    :root {
      --primary: #2563eb;
      --text: #1f2937;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 15px;
      background: #f1f5f9;
      line-height: 1.5;
      font-size: 15px;
    }

    h2 {
      margin: 0 0 6px 0;
      color: var(--text);
      font-size: 1.55rem;
      font-weight: 700;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.92rem;
      margin-bottom: 20px;
    }

    .controls {
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.07);
      padding: 20px;
      margin-bottom: 25px;
      border: 1px solid #e2e8f0;
    }

    .controls h3 {
      margin: 0 0 14px 0;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
    }

    .diameter-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }

    .diameter-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      padding: 8px 12px;
      border-radius: 9px;
      border: 1px solid #e2e8f0;
    }

    .diameter-item input {
      flex: 1;
      max-width: 130px;
      padding: 9px 12px;
      font-size: 1.05rem;
      border: 2px solid #cbd5e1;
      border-radius: 7px;
    }

    .diameter-item input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      outline: none;
    }

    .diameter-item button {
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 7px;
      padding: 8px 16px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .diameter-item button:hover {
      background: #dc2626;
    }

    .curves-section {
      margin-top: 20px;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 18px 26px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 1.02rem;
      color: #334155;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
    }

    .add-btn {
      background: #e0f2fe;
      color: #1e40af;
      border: 2px solid #bae6fd;
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .add-btn:hover {
      background: #bae6fd;
    }

    .update-btn {
      background: linear-gradient(90deg, #2563eb, #1e40af);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }

    .update-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
    }

    #plot { width: 100%; }
  </style>
</head>

<body>

<h2>Dish Antenna Beamwidth Calculator</h2>
<p class="subtitle"><small>Approximate formula: HPBW ≈ 70 × (λ / D) degrees</small></p>

<div class="controls">
  <h3>Antenna Diameters (meters)</h3>
  <div id="diameterInputs" class="diameter-list"></div>
  <button onclick="addAntenna()" class="add-btn">+ Add Antenna</button>

  <div class="curves-section">
    <h3>Beamwidth Level Curves</h3>
    <div class="checkbox-group">
      <label><input type="checkbox" value="3" checked> 3 dB</label>
      <label><input type="checkbox" value="1"> 1 dB</label>
      <label><input type="checkbox" value="0.5" checked> 0.5 dB</label>
      <label><input type="checkbox" value="0.1"> 0.1 dB</label>
    </div>
  </div>

  <button onclick="updatePlot()" class="update-btn">Update Plot</button>
</div>

<div id="plot"></div>

<script>
const c = 299792458;
const BEAMWIDTH_CONSTANT = 70;

const F_START_GHZ = 0.144;
const F_END_GHZ = 78;

const logStart = Math.log10(F_START_GHZ);
const logEnd   = Math.log10(F_END_GHZ);
const logRange = logEnd - logStart;

const emeFreqs = [0.1441, 0.4321, 1.2961, 2.3041, 3.4561, 5.7601, 10.3681, 24.1921, 47.0881, 76.5];

function generateLogTicks(minVal, maxVal) {
  const ticks = [];
  let decade = Math.pow(10, Math.floor(Math.log10(minVal) - 0.01));
  while (decade <= maxVal * 1.1) {
    for (let m of [1, 2, 5]) {
      const t = m * decade;
      if (t >= minVal * 0.9 && t <= maxVal * 1.1) {
        if (ticks.length === 0 || t / ticks[ticks.length - 1] >= 1.15) ticks.push(t);
      }
    }
    decade *= 10;
  }
  return ticks;
}

function logSpace(start, end, points) {
  const arr = [];
  const ls = Math.log10(start);
  const le = Math.log10(end);
  for (let i = 0; i < points; i++) {
    const t = i / (points - 1);
    arr.push(Math.pow(10, ls + t * (le - ls)));
  }
  return arr;
}

function hpbw(lambda, D, dbLevel) {
  const bw3 = BEAMWIDTH_CONSTANT * (lambda / D);
  if (dbLevel === "3") return bw3;
  const factor = Math.sqrt(parseFloat(dbLevel) / 3);
  return bw3 * factor;
}

function addAntenna(value = 1.0) {
  const div = document.getElementById("diameterInputs");
  const wrapper = document.createElement("div");
  wrapper.className = "diameter-item";
  
  const input = document.createElement("input");
  input.type = "number";
  input.step = "0.1";
  input.value = value;
  
  const removeBtn = document.createElement("button");
  removeBtn.innerHTML = "Remove";
  removeBtn.onclick = () => { wrapper.remove(); updatePlot(); };
  
  wrapper.appendChild(input);
  wrapper.appendChild(removeBtn);
  div.appendChild(wrapper);
}

function getDiameters() {
  return Array.from(document.querySelectorAll("#diameterInputs input"))
    .map(i => parseFloat(i.value))
    .filter(v => !isNaN(v) && v > 0);
}

function getSelectedCurves() {
  return Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
    .map(cb => cb.value);
}

function updatePlot() {
  const isMobile = window.innerWidth < 768;
  
  const freq_hz = logSpace(F_START_GHZ * 1e9, F_END_GHZ * 1e9, 1000);
  const freq_ghz = freq_hz.map(f => f / 1e9);
  const lambda = freq_hz.map(f => c / f);

  const diameters = getDiameters();
  const curves = getSelectedCurves();

  let traces = [];

  diameters.forEach(D => {
    curves.forEach(curve => {
      const scaled = lambda.map(lam => hpbw(lam, D, curve));

      traces.push({
        x: freq_ghz,
        y: scaled,
        mode: "lines",
        name: `${D} m (${curve} dB)`,
        line: { width: 2.8 },
        hovertemplate:
          `<b>${D} m Antenna</b><br>` +
          `Level: ${curve} dB<br>` +
          `Frequency: %{x:.4f} GHz<br>` +
          `Beamwidth: %{y:.3f}°<extra></extra>`
      });

      const emeY = emeFreqs.map(f => {
        let idx = 0, minDiff = Infinity;
        for (let i = 0; i < freq_ghz.length; i++) {
          const diff = Math.abs(freq_ghz[i] - f);
          if (diff < minDiff) { minDiff = diff; idx = i; }
        }
        return scaled[idx];
      });

      traces.push({
        x: emeFreqs,
        y: emeY,
        mode: "markers",
        marker: { size: 7.5, color: "#b91c1c", symbol: "circle", line: {color: "white", width: 1.8} },
        showlegend: false,
        hovertemplate:
          `EME Frequency: %{x:.4f} GHz<br>` +
          `Beamwidth: %{y:.3f}°<br>` +
          `(${D} m @ ${curve} dB)<extra></extra>`
      });
    });
  });

  let allY = traces.flatMap(t => t.y || []);
  const yMin = allY.length ? Math.max(0.001, Math.min(...allY)) : 0.01;
  const yMax = allY.length ? Math.max(1, Math.max(...allY) * 1.25) : 100;
  const yLogMin = Math.log10(yMin * 0.8);
  const yLogMax = Math.log10(yMax * 1.25);

  const xTicks = generateLogTicks(F_START_GHZ, F_END_GHZ);

  const emeShapes = emeFreqs.map(f => ({
    type: "line", xref: "paper", yref: "paper",
    x0: (Math.log10(f) - logStart) / logRange,
    x1: (Math.log10(f) - logStart) / logRange,
    y0: 0, y1: 1,
    line: { color: "rgba(220, 20, 60, 0.55)", width: 1.5, dash: "dot" },
    layer: "below"
  }));

  const emeAnnotations = emeFreqs.map(f => ({
    x: (Math.log10(f) - logStart) / logRange + 0.004,
    y: 0.04,
    xref: "paper", yref: "paper",
    text: f.toFixed(3),
    showarrow: false,
    xanchor: "left",
    font: { size: 11, color: "#b91c1c" },
    textangle: -90,
    opacity: 0.9,
    layer: "below"
  }));

  const LIMIT = 35;

  const limitShapes = [{
    type: "line",
    xref: "paper", yref: "y",
    x0: 0, x1: 1,
    y0: LIMIT, y1: LIMIT,
    line: { color: "#d97706", width: 4, dash: "dash" },
    layer: "above"
  }];

  // Clean, reliable practical limit label
  const limitAnnotations = [{
    x: 0.85,
    y: 0.79,
    xref: "paper",
    yref: "paper",
    text: "HPBW ≈ 2λ (practical limit)",
    showarrow: false,
    font: { size: 13, color: "#d97706" },
    bgcolor: "rgba(254, 252, 232, 0.85)",
    bordercolor: "transparent",
    borderwidth: 0,
    borderpad: 6,
    opacity: 1,
    layer: "above"
  }];

  const layout = {
    title: "Parabolic Antenna Beamwidth vs Frequency (Log-Log)",
    autosize: true,
    showlegend: true,
    legend: {
      x: isMobile ? 0.95 : 1.02,
      y: isMobile ? 0.98 : 1.0,
      xanchor: isMobile ? 'right' : 'left',
      yanchor: 'top',
      bgcolor: '#ffffff',
      bordercolor: '#94a3b8',
      borderwidth: 2,
      font: {
        size: isMobile ? 11.5 : 13,
        color: '#1e2937'
      }
    },
    margin: {
      l: isMobile ? 48 : 70,
      r: isMobile ? 32 : 40,
      t: 55,
      b: 65
    },
    xaxis: {
      title: "Frequency (GHz)",
      type: "log",
      range: [logStart, logEnd],
      fixedrange: true,
      tickmode: "array",
      tickvals: xTicks,
      ticktext: xTicks.map(v => v >= 10 ? v.toFixed(0) : v.toFixed(v < 1 ? 3 : 2)),
      gridcolor: "#ddd",
      minor: { showgrid: true }
    },
    yaxis: {
      title: "Beamwidth (degrees)",
      type: "log",
      range: [yLogMin, yLogMax],
      fixedrange: true,
      tickmode: "array",
      tickvals: generateLogTicks(Math.pow(10, yLogMin), Math.pow(10, yLogMax)),
      ticktext: generateLogTicks(Math.pow(10, yLogMin), Math.pow(10, yLogMax)).map(v => v >= 10 ? v.toFixed(0) : v.toFixed(v < 1 ? 3 : 2)),
      gridcolor: "#ddd",
      minor: { showgrid: true }
    },
    shapes: [...emeShapes, ...limitShapes],
    annotations: [...emeAnnotations, ...limitAnnotations],
    hovermode: "closest",
    dragmode: false,
    height: isMobile ? 560 : 720
  };

  const config = {
    scrollZoom: false,
    displayModeBar: true,
    modeBarButtonsToRemove: ['zoom2d','pan2d','select2d','lasso2d','zoomIn2d','zoomOut2d'],
    displaylogo: false,
    responsive: true
  };

  Plotly.newPlot("plot", traces, layout, config);
}

// Initialize
addAntenna(3.0);
addAntenna(0.9);
updatePlot();

// Refresh on resize
window.addEventListener('resize', () => {
  if (document.getElementById('plot').data) updatePlot();
});
</script>

</body>
</html>
